<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Kanban Board</h1>
            <div class="header-controls">
                <button id="addTaskBtn" class="btn-primary">+ Add Task</button>
                <button id="darkModeToggle" class="btn-icon" aria-label="Toggle dark mode">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
                    </svg>
                </button>
            </div>
        </header>

        <main class="board">
            <div class="column" data-status="todo">
                <div class="column-header">
                    <h2>To Do</h2>
                    <span class="task-count">0</span>
                </div>
                <div class="column-content" data-column="todo">
                    <div class="empty-state">No tasks yet</div>
                </div>
            </div>

            <div class="column" data-status="inprogress">
                <div class="column-header">
                    <h2>In Progress</h2>
                    <span class="task-count">0</span>
                </div>
                <div class="column-content" data-column="inprogress">
                    <div class="empty-state">No tasks yet</div>
                </div>
            </div>

            <div class="column" data-status="completed">
                <div class="column-header">
                    <h2>Completed</h2>
                    <span class="task-count">0</span>
                </div>
                <div class="column-content" data-column="completed">
                    <div class="empty-state">No tasks yet</div>
                </div>
            </div>
        </main>
    </div>

    <div id="taskModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Task</h2>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            <form id="taskForm">
                <div class="form-group">
                    <label for="taskTitle">Title <span class="required">*</span></label>
                    <input type="text" id="taskTitle" placeholder="Enter task title" required>
                </div>
                <div class="form-group">
                    <label for="taskDescription">Description</label>
                    <textarea id="taskDescription" rows="4" placeholder="Enter task description (optional)"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn-primary">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <div id="deleteModal" class="modal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2>Delete Task</h2>
                <button class="close-btn" id="closeDeleteModal">&times;</button>
            </div>
            <p class="delete-message">Are you sure you want to delete this task? This action cannot be undone.</p>
            <div class="modal-footer">
                <button type="button" class="btn-secondary" id="cancelDeleteBtn">Cancel</button>
                <button type="button" class="btn-danger" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
