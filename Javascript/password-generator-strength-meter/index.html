<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator with Strength Meter</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <h1>Password Generator</h1>
                </div>
                <button id="darkModeToggle" class="dark-mode-btn" aria-label="Toggle dark mode">
                    <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Password Display Card -->
            <div class="card password-card">
                <div class="card-header">
                    <h2>Generated Password</h2>
                    <span class="char-count" id="charCount">0 characters</span>
                </div>
                
                <div class="password-output-wrapper">
                    <div class="password-display">
                        <input type="password" id="passwordOutput" class="password-input" readonly placeholder="Your password will appear here">
                        <button id="toggleMask" class="icon-btn mask-btn" aria-label="Toggle password visibility">
                            <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            <svg class="eye-off-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        </button>
                    </div>
                    <button id="copyBtn" class="copy-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                        Copy Password
                    </button>
                </div>

                <!-- Strength Meter -->
                <div class="strength-section">
                    <div class="strength-header">
                        <span class="strength-label">Password Strength</span>
                        <span class="entropy-badge" id="entropyBadge">0 bits entropy</span>
                    </div>
                    <div class="strength-meter">
                        <div class="strength-fill" id="strengthFill"></div>
                    </div>
                    <div class="strength-text" id="strengthText">Click generate to create password</div>
                </div>

                <!-- Generate Button -->
                <button id="generateBtn" class="generate-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                        <path d="M3 3v5h5"></path>
                        <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"></path>
                        <path d="M16 16h5v5"></path>
                    </svg>
                    Generate Password
                </button>
                <p class="shortcut-hint">Press <kbd>Space</kbd> or <kbd>Enter</kbd> to generate</p>
            </div>

            <!-- Options Card -->
            <div class="card options-card">
                <h2>Password Options</h2>
                
                <!-- Length Slider -->
                <div class="option-group">
                    <div class="option-header">
                        <label for="lengthSlider">Password Length</label>
                        <span class="length-value" id="lengthValue">16</span>
                    </div>
                    <input type="range" id="lengthSlider" class="slider" min="8" max="32" value="16">
                    <div class="slider-labels">
                        <span>8</span>
                        <span>32</span>
                    </div>
                </div>

                <!-- Character Options -->
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="uppercase" checked>
                        <span class="checkbox-custom"></span>
                        <span class="checkbox-text">
                            <strong>Uppercase Letters</strong>
                            <span class="checkbox-desc">A-Z</span>
                        </span>
                    </label>
                    
                    <label class="checkbox-label">
                        <input type="checkbox" id="lowercase" checked>
                        <span class="checkbox-custom"></span>
                        <span class="checkbox-text">
                            <strong>Lowercase Letters</strong>
                            <span class="checkbox-desc">a-z</span>
                        </span>
                    </label>
                    
                    <label class="checkbox-label">
                        <input type="checkbox" id="numbers" checked>
                        <span class="checkbox-custom"></span>
                        <span class="checkbox-text">
                            <strong>Numbers</strong>
                            <span class="checkbox-desc">0-9</span>
                        </span>
                    </label>
                    
                    <label class="checkbox-label">
                        <input type="checkbox" id="symbols" checked>
                        <span class="checkbox-custom"></span>
                        <span class="checkbox-text">
                            <strong>Special Characters</strong>
                            <span class="checkbox-desc">!@#$%^&*</span>
                        </span>
                    </label>
                </div>
            </div>

            <!-- History Card -->
            <div class="card history-card">
                <h2>Recent Passwords</h2>
                <div class="history-list" id="historyList">
                    <div class="empty-history">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                        <p>No passwords generated yet</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        <span id="toastMessage">Password copied to clipboard!</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
